<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylespeli.css">
    <link rel="stylesheet" href="korttimodelit.css">
</head>
<body>
    <div class="korttipelijuhuu">
        <div class="peli_alue">
            <div class="clean-cards">
                <div class="numberguide">
                    <div class="number1">1</div>
                    <div class="number2">2</div>
                    <div class="number3">3</div>
                    <div class="number4">4</div>
                    <div class="number5">5</div>
                    <div class="number6">6</div>
                </div>
                <p class="korttipeliTeksti">Korttipeli</p>
                <div class="card-row">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_A.png" alt="Clubs Ace">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_2.png" alt="Clubs 2">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_3.png" alt="Clubs 3">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_4.png" alt="Clubs 4">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_5.png" alt="Clubs 5">
                    <img src="kortti_modelit/Clubs/CleanCards/Clubs_6.png" alt="Clubs 6">
                </div>
                <div class="card-row">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_A.png" alt="Diamonds Ace">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_2.png" alt="Diamonds 2">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_3.png" alt="Diamonds 3">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_4.png" alt="Diamonds 4">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_5.png" alt="Diamonds 5">
                    <img src="kortti_modelit/Diamonds/CleanCards/Diamonds_6.png" alt="Diamonds 6">
                </div>
                <div class="card-row">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_A.png" alt="Hearts Ace">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_2.png" alt="Hearts 2">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_3.png" alt="Hearts 3">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_4.png" alt="Hearts 4">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_5.png" alt="Hearts 5">
                    <img src="kortti_modelit/Hearts/CleanCards/Hearts_6.png" alt="Hearts 6">
                </div>
                <div class="card-row">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_A.png" alt="Spades Ace">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_2.png" alt="Spades 2">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_3.png" alt="Spades 3">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_4.png" alt="Spades 4">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_5.png" alt="Spades 5">
                    <img src="kortti_modelit/Spades/CleanCards/Spades_6.png" alt="Spades 6">
                </div>
            </div>
        </div>
        <div class="deckShuffleButton">
            <button class="shuffleButton">Sekoita pakka</button>
        </div>
        <div class="move-counter">
            <h3>Moves</h3>
            <p class="move-count">0</p>
        </div>
    </div>
    <script src="scriptpeli.js"></script>
</body>
</html>
